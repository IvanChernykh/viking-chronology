<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">Viking Chronology architecture</title><desc id="desc">Layered architecture from research data to the 3D rendering and interaction systems.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b0d0d"/><stop offset="1" stop-color="#21160f"/></linearGradient><linearGradient id="box" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#241c15"/><stop offset="1" stop-color="#100d0a"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#b89555"/></marker></defs>
  <rect width="1440" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="62" fill="#d2ad68" font-family="Arial" font-size="12" font-weight="700" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <text x="64" y="105" fill="#efe3c8" font-family="Georgia" font-size="34">Research data becomes a resilient interactive scene</text>
  <g font-family="Arial">
    <g transform="translate(64 150)"><rect width="274" height="306" rx="20" fill="url(#box)" stroke="#d2ad68" stroke-opacity=".24"/><text x="28" y="42" fill="#d2ad68" font-size="11" font-weight="700" letter-spacing="2">01 · KNOWLEDGE</text><text x="28" y="82" fill="#efe3c8" font-family="Georgia" font-size="24">Historical dataset</text><text x="28" y="122" fill="#9e947f" font-size="14">Routes and stop chronology</text><text x="28" y="150" fill="#9e947f" font-size="14">Evidence and confidence levels</text><text x="28" y="178" fill="#9e947f" font-size="14">Institutional source links</text><rect x="28" y="220" width="218" height="44" rx="10" fill="#2b2117"/><text x="137" y="247" text-anchor="middle" fill="#d9c69d" font-size="12">src/data/routes.ts</text></g>
    <g transform="translate(390 150)"><rect width="274" height="306" rx="20" fill="url(#box)" stroke="#d2ad68" stroke-opacity=".24"/><text x="28" y="42" fill="#d2ad68" font-size="11" font-weight="700" letter-spacing="2">02 · DOMAIN</text><text x="28" y="82" fill="#efe3c8" font-family="Georgia" font-size="24">Geo &amp; timeline</text><text x="28" y="122" fill="#9e947f" font-size="14">Lat/lon to flat world projection</text><text x="28" y="150" fill="#9e947f" font-size="14">Catmull–Rom route curves</text><text x="28" y="178" fill="#9e947f" font-size="14">Year-based visibility state</text><rect x="28" y="220" width="218" height="44" rx="10" fill="#2b2117"/><text x="137" y="247" text-anchor="middle" fill="#d9c69d" font-size="12">src/lib/flatMap.ts</text></g>
    <g transform="translate(716 150)"><rect width="274" height="306" rx="20" fill="url(#box)" stroke="#d2ad68" stroke-opacity=".24"/><text x="28" y="42" fill="#d2ad68" font-size="11" font-weight="700" letter-spacing="2">03 · EXPERIENCE</text><text x="28" y="82" fill="#efe3c8" font-family="Georgia" font-size="24">Interaction layer</text><text x="28" y="122" fill="#9e947f" font-size="14">Side camera + MapControls</text><text x="28" y="150" fill="#9e947f" font-size="14">Fog, markers and character dialogue</text><text x="28" y="178" fill="#9e947f" font-size="14">Russian subtitles + evidence panels</text><rect x="28" y="220" width="218" height="44" rx="10" fill="#2b2117"/><text x="137" y="247" text-anchor="middle" fill="#d9c69d" font-size="12">React + R3F</text></g>
    <g transform="translate(1042 150)"><rect width="334" height="306" rx="20" fill="url(#box)" stroke="#d2ad68" stroke-opacity=".24"/><text x="28" y="42" fill="#d2ad68" font-size="11" font-weight="700" letter-spacing="2">04 · RUNTIME</text><text x="28" y="82" fill="#efe3c8" font-family="Georgia" font-size="24">Adaptive rendering</text><text x="28" y="122" fill="#9e947f" font-size="14">Stable device-specific DPR</text><text x="28" y="150" fill="#9e947f" font-size="14">High / balanced / battery profiles</text><text x="28" y="178" fill="#9e947f" font-size="14">WebGL context recovery</text><text x="28" y="206" fill="#9e947f" font-size="14">ES2018 standalone fallback</text><rect x="28" y="242" width="278" height="44" rx="10" fill="#2b2117"/><text x="167" y="269" text-anchor="middle" fill="#d9c69d" font-size="12">Three.js + Web Audio + Speech</text></g>
  </g>
  <g fill="none" stroke="#b89555" stroke-opacity=".55" stroke-width="2" marker-end="url(#arrow)"><path d="M338 303h40"/><path d="M664 303h40"/><path d="M990 303h40"/></g>
  <text x="64" y="510" fill="#786f60" font-family="Arial" font-size="13">The rendering layer never owns historical truth; it visualizes a separately maintained evidence model.</text>
</svg>
