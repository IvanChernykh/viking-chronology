<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc">
  <title id="title">Explore, inspect, verify</title><desc id="desc">Three-stage product experience of the atlas.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#0c1010"/><stop offset="1" stop-color="#21160f"/></linearGradient><linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#201a14"/><stop offset="1" stop-color="#0d0b09"/></linearGradient></defs>
  <rect width="1440" height="420" rx="28" fill="url(#bg)"/><text x="64" y="60" fill="#d2ad68" font-family="Arial" font-size="12" font-weight="700" letter-spacing="3">THE EXPLORATION LOOP</text><text x="64" y="102" fill="#efe3c8" font-family="Georgia" font-size="34">From movement to evidence in three deliberate steps</text>
  <g transform="translate(64 142)">
    <g><rect width="400" height="220" rx="20" fill="url(#card)" stroke="#d2ad68" stroke-opacity=".25"/><circle cx="48" cy="48" r="22" fill="#d2ad68"/><text x="48" y="55" text-anchor="middle" fill="#17110c" font-family="Arial" font-size="15" font-weight="800">01</text><text x="84" y="53" fill="#efe3c8" font-family="Georgia" font-size="25">Explore</text><text x="32" y="104" fill="#a69b85" font-family="Arial" font-size="14">Rotate the globe manually, filter route layers</text><text x="32" y="129" fill="#a69b85" font-family="Arial" font-size="14">and scrub the timeline from 750 to 1021 CE.</text><path d="M32 166h336" stroke="#d2ad68" stroke-opacity=".18"/><text x="32" y="196" fill="#d2ad68" font-family="Arial" font-size="11" letter-spacing="1.5">NO AUTOPLAY · FULL CONTROL</text></g>
    <g transform="translate(424)"><rect width="400" height="220" rx="20" fill="url(#card)" stroke="#d2ad68" stroke-opacity=".25"/><circle cx="48" cy="48" r="22" fill="#b55b47"/><text x="48" y="55" text-anchor="middle" fill="#fff4e1" font-family="Arial" font-size="15" font-weight="800">02</text><text x="84" y="53" fill="#efe3c8" font-family="Georgia" font-size="25">Inspect</text><text x="32" y="104" fill="#a69b85" font-family="Arial" font-size="14">Tap a historical marker to open its story,</text><text x="32" y="129" fill="#a69b85" font-family="Arial" font-size="14">dating, geography and reconstruction context.</text><path d="M32 166h336" stroke="#d2ad68" stroke-opacity=".18"/><text x="32" y="196" fill="#b96b57" font-family="Arial" font-size="11" letter-spacing="1.5">LARGE HIT AREAS · MOBILE SAFE</text></g>
    <g transform="translate(848)"><rect width="400" height="220" rx="20" fill="url(#card)" stroke="#d2ad68" stroke-opacity=".25"/><circle cx="48" cy="48" r="22" fill="#739680"/><text x="48" y="55" text-anchor="middle" fill="#eef8ef" font-family="Arial" font-size="15" font-weight="800">03</text><text x="84" y="53" fill="#efe3c8" font-family="Georgia" font-size="25">Verify</text><text x="32" y="104" fill="#a69b85" font-family="Arial" font-size="14">Review confidence labels, evidence notes and</text><text x="32" y="129" fill="#a69b85" font-family="Arial" font-size="14">institutional sources behind each reconstruction.</text><path d="M32 166h336" stroke="#d2ad68" stroke-opacity=".18"/><text x="32" y="196" fill="#7fa78c" font-family="Arial" font-size="11" letter-spacing="1.5">EVIDENCE FIRST · NO FANTASY CLAIMS</text></g>
  </g>
</svg>
