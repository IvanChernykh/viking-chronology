<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Viking Chronology — cinematic hero</title>
  <desc id="desc">A dark Nordic historical atlas with a glowing globe, sea routes and a longship silhouette.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080a0a"/><stop offset=".46" stop-color="#111817"/><stop offset="1" stop-color="#21160f"/></linearGradient>
    <radialGradient id="halo" cx="70%" cy="44%" r="48%"><stop stop-color="#c99d53" stop-opacity=".34"/><stop offset=".46" stop-color="#6d5130" stop-opacity=".11"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <radialGradient id="ocean" cx="42%" cy="36%" r="72%"><stop stop-color="#28403f"/><stop offset=".62" stop-color="#142827"/><stop offset="1" stop-color="#091312"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#8d6938"/><stop offset=".42" stop-color="#efd79a"/><stop offset=".58" stop-color="#c9a35f"/><stop offset="1" stop-color="#72502c"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#1f1913" stop-opacity=".94"/><stop offset="1" stop-color="#0d0b09" stop-opacity=".94"/></linearGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="routeGlow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".55"/></filter>
    <pattern id="grain" width="56" height="56" patternUnits="userSpaceOnUse"><circle cx="8" cy="11" r="1" fill="#fff" opacity=".025"/><circle cx="32" cy="29" r=".8" fill="#fff" opacity=".022"/><circle cx="47" cy="7" r=".7" fill="#fff" opacity=".018"/></pattern>
    <clipPath id="globeClip"><circle cx="1150" cy="365" r="252"/></clipPath>
  </defs>
  <rect width="1600" height="720" rx="34" fill="url(#sky)"/><rect width="1600" height="720" rx="34" fill="url(#halo)"/><rect width="1600" height="720" rx="34" fill="url(#grain)"/>
  <g opacity=".38" fill="#dbc58f"><circle cx="112" cy="88" r="1.4"/><circle cx="246" cy="126" r="1"/><circle cx="392" cy="72" r="1.3"/><circle cx="530" cy="110" r=".9"/><circle cx="685" cy="55" r="1.1"/><circle cx="844" cy="126" r=".8"/><circle cx="1338" cy="82" r="1.4"/><circle cx="1462" cy="152" r="1"/><circle cx="1510" cy="48" r=".9"/></g>
  <g filter="url(#shadow)"><rect x="72" y="70" width="720" height="572" rx="28" fill="url(#panel)" stroke="#d0aa66" stroke-opacity=".22"/><path d="M104 108h656" stroke="#d0aa66" stroke-opacity=".18"/><path d="M104 602h656" stroke="#d0aa66" stroke-opacity=".18"/></g>
  <g transform="translate(112 112)"><rect width="192" height="42" rx="21" fill="#2d2117" stroke="#d0aa66" stroke-opacity=".42"/><circle cx="23" cy="21" r="5" fill="#d6b776" filter="url(#softGlow)"/><text x="40" y="27" fill="#e5d3a6" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.4">LIVE 3D ATLAS</text></g>
  <text x="112" y="228" fill="#8f7b58" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4">750 — 1021 CE · NORTHERN ROUTES</text>
  <text x="112" y="298" fill="#f4e8cc" font-family="Georgia, serif" font-size="68" font-weight="600">Viking</text><text x="112" y="366" fill="url(#gold)" font-family="Georgia, serif" font-size="68" font-weight="600">Chronology</text>
  <text x="112" y="418" fill="#b7a989" font-family="Arial, sans-serif" font-size="20" letter-spacing=".5">Исторический интерактивный 3D-атлас</text><text x="112" y="456" fill="#7f7767" font-family="Arial, sans-serif" font-size="16">Маршруты · торговые узлы · поселения · события</text>
  <g transform="translate(112 508)"><rect width="236" height="58" rx="12" fill="url(#gold)"/><text x="118" y="36" text-anchor="middle" fill="#17110c" font-family="Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.7">OPEN THE ATLAS  →</text></g>
  <g transform="translate(370 508)"><rect width="186" height="58" rx="12" fill="#151310" stroke="#d0aa66" stroke-opacity=".36"/><text x="93" y="36" text-anchor="middle" fill="#d5c59f" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">19 LOCATIONS</text></g>
