  <g transform="translate(1116 300) rotate(-18)"><path d="M-64 16c30 16 77 17 128 0-7 27-26 42-61 46-37 4-60-11-67-46z" fill="#0a0a09" opacity=".92"/><path d="M-42 7h82M-25-4h49" stroke="#d6b776" stroke-opacity=".75" stroke-width="3" stroke-linecap="round"/><path d="M0 17V-66" stroke="#e2cca0" stroke-width="3"/><path d="M2-62c30 14 43 38 31 66H2z" fill="#b75b43" opacity=".86"/><path d="M-64 16l-12-14M64 16l13-15" stroke="#d6b776" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="translate(970 644)"><text x="0" y="0" fill="#8f8060" font-family="Georgia, serif" font-size="16" letter-spacing="10">ᚠ ᚢ ᚦ ᚬ ᚱ ᚴ ᚼ ᚾ ᛁ ᛅ ᛋ ᛏ ᛒ ᛘ ᛚ ᛦ</text></g>
