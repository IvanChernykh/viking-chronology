name: Pages Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SITE_URL: https://ivanchernykh.github.io/viking-chronology/

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Full quality gate
        run: npm run check
      - name: Prepare Pages release
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
          printf '%s\n' "${GITHUB_SHA}" > dist/version.txt
      - name: Upload official Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Publish orphan gh-pages fallback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

  enable-pages:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ensure Pages site exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(curl --silent --output /tmp/pages.json --write-out "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          echo "Pages GET status: ${current}"
          cat /tmp/pages.json || true
          if [ "${current}" = "404" ]; then
            created=$(curl --silent --output /tmp/create-pages.json --write-out "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}')
            echo "Pages POST status: ${created}"
            cat /tmp/create-pages.json || true
            if [ "${created}" != "201" ] && [ "${created}" != "204" ]; then
              echo "Unable to create Pages site through the repository token."
              exit 1
            fi
          elif [ "${current}" != "200" ]; then
            echo "Unable to read Pages configuration."
            exit 1
          fi

  deploy:
    needs: [build, enable-pages]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Deploy production game
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-site:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify HTTP response and release SHA
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            status=$(curl --location --silent --output /tmp/site.html --write-out "%{http_code}" "${SITE_URL}?sha=${GITHUB_SHA}")
            marker=$(curl --location --silent "${SITE_URL}version.txt?sha=${GITHUB_SHA}" || true)
            echo "Attempt ${attempt}: HTTP ${status}; marker ${marker}"
            if [ "${status}" = "200" ] && grep -q "Viking Chronology\|Пути северных мореходов" /tmp/site.html && [ "${marker}" = "${GITHUB_SHA}" ]; then
              echo "Verified ${SITE_URL} at ${GITHUB_SHA}"
              exit 0
            fi
            sleep 12
          done
          echo "Pages did not return the expected release."
          exit 1

  report-release:
    if: always()
    needs: [build, enable-pages, deploy, verify-live-site]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Publish machine-readable release status
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          ENABLE_RESULT: ${{ needs.enable-pages.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          VERIFY_RESULT: ${{ needs.verify-live-site.result }}
        run: |
          mkdir -p /tmp/pages-status
          cd /tmp/pages-status
          git init
          git checkout -b pages-status
          cat > status.json <<EOF
          {
            "sha": "${GITHUB_SHA}",
            "build": "${BUILD_RESULT}",
            "enablePages": "${ENABLE_RESULT}",
            "deploy": "${DEPLOY_RESULT}",
            "verify": "${VERIFY_RESULT}",
            "runId": "${GITHUB_RUN_ID}",
            "site": "${SITE_URL}"
          }
          EOF
          printf '%s\n' "${GITHUB_SHA}" > version.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json version.txt
          git commit -m "Report Pages release ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" pages-status:pages-status
