name: Roblox Foundation

on:
  pull_request:
    paths:
      - "roblox/**"
      - ".github/workflows/roblox-ci.yml"
  push:
    branches: [main]
    paths:
      - "roblox/**"
      - ".github/workflows/roblox-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: roblox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Structural validation
        run: python scripts/validate.py
      - name: Install Rokit
        run: |
          curl -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"
      - name: Install pinned tools
        run: |
          export PATH="$HOME/.rokit/bin:$PATH"
          rokit install
      - name: Parse and normalize Luau formatting
        run: stylua src
      - name: Luau lint
        run: selene src
      - name: Build place
        run: |
          mkdir -p build
          rojo build default.project.json --output build/VikingChronology.rbxlx
