name: Roblox Foundation

on:
  pull_request:
    paths:
      - "roblox/**"
      - ".github/workflows/roblox-ci.yml"
  push:
    branches: [main]
    paths:
      - "roblox/**"
      - ".github/workflows/roblox-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: roblox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Structural validation
        run: python scripts/validate.py
      - name: Install Rokit
        run: |
          curl -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"
      - name: Trust and install pinned tools
        id: install-tools
        continue-on-error: true
        run: |
          export PATH="$HOME/.rokit/bin:$PATH"
          {
            rokit add rojo-rbx/rojo@7.7.0
            rokit add Kampfkarren/selene@0.31.0
            rokit add JohnnyMorganz/StyLua@2.5.2
            rokit install
          } > "$RUNNER_TEMP/rokit-install.log" 2>&1
      - name: Upload toolchain diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rokit-install-log
          path: ${{ runner.temp }}/rokit-install.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce toolchain installation
        if: steps.install-tools.outcome != 'success'
        run: |
          cat "$RUNNER_TEMP/rokit-install.log"
          exit 1
      - name: Parse and normalize Luau formatting
        run: stylua src
      - name: Luau lint
        run: selene src
      - name: Build place
        run: |
          mkdir -p build
          rojo build default.project.json --output build/VikingChronology.rbxlx
