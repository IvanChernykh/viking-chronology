name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint diagnostics
        id: lint
        continue-on-error: true
        run: |
          set +e
          npm run lint > lint-report.txt 2>&1
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          cat lint-report.txt
          exit 0

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt

      - name: Enforce lint
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Standalone build
        run: npm run standalone

      - name: Verify standalone compatibility
        run: npm run verify:standalone
