name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint > "$RUNNER_TEMP/lint.log" 2>&1
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: ${{ runner.temp }}/lint.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce lint
        if: steps.lint.outcome != 'success'
        run: |
          cat "$RUNNER_TEMP/lint.log"
          exit 1
      - name: Strict TypeScript
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Verify production output
        run: npm run verify:production
      - name: Standalone build
        run: npm run standalone
      - name: Verify standalone compatibility
        run: npm run verify:standalone
